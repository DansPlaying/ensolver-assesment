[build]
  base    = "frontend"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cron job: ping the DB 3x/day to prevent Supabase free-tier from pausing
[functions."keep-alive"]
  schedule = "0 8,14,20 * * *"

# Required environment variables — set these in the Netlify dashboard:
#   DATABASE_URL   — Supabase PostgreSQL connection string
#   AUTH_SECRET    — NextAuth secret (generate with: openssl rand -base64 32)
#   NEXTAUTH_URL   — Your Netlify site URL (e.g. https://your-site.netlify.app)
